<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Il mio spazio · Cloud</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg:#f5f4f0;--bg2:#eceae4;--bg3:#fff;--surface:#fff;
    --border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.14);
    --text:#1a1917;--text2:#6b6860;--text3:#9c9a96;
    --accent:#3d5a3e;--accent-light:#e8f0e8;--accent-text:#2a3f2b;
    --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
    --r:10px;--rl:16px;--sw:220px;--tr:.18s ease;
  }
  @media(prefers-color-scheme:dark){:root{
    --bg:#141412;--bg2:#1e1d1b;--bg3:#252421;--surface:#1e1d1b;
    --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
    --text:#f0ede8;--text2:#9a9790;--text3:#5c5a56;
    --accent:#7aad7c;--accent-light:#1e2e1e;--accent-text:#a8cfa9;
  }}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);height:100vh;overflow:hidden;font-size:14px}
  .app{display:flex;height:100%}
  .sidebar{width:var(--sw);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column}
  .sb-head{padding:20px 16px;border-bottom:1px solid var(--border);font-weight:500}
  .sb-nav{flex:1;padding:12px 8px}
  .nav-item{display:flex;padding:10px;border-radius:8px;cursor:pointer;color:var(--text2);margin-bottom:4px;transition:var(--tr)}
  .nav-item.active{background:var(--bg3);color:var(--text);font-weight:500;border:1px solid var(--border)}
  .main{flex:1;overflow-y:auto;padding:32px}
  .page{display:none} .page.active{display:block}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:24px;margin-bottom:20px}
  .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
  .metric{background:var(--surface);border:1px solid var(--border);padding:18px;border-radius:var(--r)}
  .mv{font-size:28px;font-family:var(--mono);letter-spacing:-1px}
  .fi{width:100%;padding:12px;margin-bottom:12px;border-radius:8px;border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-family:var(--sans);outline:none}
  .btn{padding:12px 24px;border-radius:8px;border:none;cursor:pointer;font-weight:500;background:var(--accent);color:white}
  .ri{padding:14px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
  .de{padding:16px;background:var(--bg2);border-radius:12px;margin-bottom:12px;border-left:4px solid var(--accent)}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sb-head">Il mio spazio · Firestore</div>
    <nav class="sb-nav">
      <div class="nav-item active" data-page="home">Dashboard</div>
      <div class="nav-item" data-page="diary">Diario</div>
      <div class="nav-item" data-page="exams">Esami</div>
    </nav>
  </aside>

  <main class="main">
    <section id="page-home" class="page active">
      <h1>Dashboard Cloud</h1>
      <div class="metrics">
        <div class="metric"><small>UMORE OGGI</small><div class="mv" id="h-mood">—</div></div>
        <div class="metric"><small>MEDIA</small><div class="mv" id="h-avg">0.00</div></div>
        <div class="metric"><small>ESAMI</small><div class="mv" id="h-exams">0</div></div>
      </div>
      <div class="card">
        <h3>Come ti senti?</h3><br>
        <button class="btn" onclick="updateMood('Ottimo')">Ottimo</button>
        <button class="btn" onclick="updateMood('Stanco')">Stanco</button>
      </div>
    </section>

    <section id="page-diary" class="page">
      <h1>Diario</h1>
      <div class="card">
        <textarea id="d-input" class="fi" rows="3" placeholder="A cosa pensi?"></textarea>
        <button class="btn" onclick="addDiaryEntry()">Salva Cloud</button>
      </div>
      <div id="d-list"></div>
    </section>

    <section id="page-exams" class="page">
      <h1>Libretto</h1>
      <div class="card">
        <input id="ex-n" class="fi" placeholder="Materia">
        <div style="display:flex; gap:10px">
            <input id="ex-v" class="fi" type="number" placeholder="Voto">
            <input id="ex-c" class="fi" type="number" placeholder="CFU">
        </div>
        <button class="btn" onclick="addExam()">Salva Esame</button>
      </div>
      <div id="ex-list"></div>
    </section>
  </main>
</div>
